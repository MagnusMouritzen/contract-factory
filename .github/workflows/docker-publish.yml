name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build image
        run: |
            docker build \
              -t ${{ vars.DOCKERHUB_REPOSITORY }}:latest \
              -t ${{ vars.DOCKERHUB_REPOSITORY }}:${{ github.sha }} \
              .

      - name: Push image
        run: |
            docker push ${{ vars.DOCKERHUB_REPOSITORY }}:latest 
            docker push ${{ vars.DOCKERHUB_REPOSITORY }}:${{ github.sha }} 